<!DOCTYPE html>
<html>
<head>
    <title>Scan QR</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f8;
            padding: 40px;
        }
        .box {
            background: white;
            padding: 25px;
            max-width: 400px;
            margin: auto;
            border-radius: 8px;
            box-shadow: 0 0 10px #ccc;
            text-align: center;
        }
        input {
            padding: 10px;
            width: 90%;
        }
        button {
            margin-top: 15px;
            padding: 10px 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>📷 Scan QR Code</h2>

    <p>Paste Donation ID from QR code</p>

    <form method="post" action="/scan/result">
        <input type="text" name="donation_id" placeholder="Enter Donation ID" required>
        <br><br>
        <button type="submit">🔍 View Donation Details</button>
    </form>
</div>

</body>
</html>
