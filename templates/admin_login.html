<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
   <style>
    body {
        margin: 0;
        height: 100vh;
        font-family: 'Segoe UI', Arial, sans-serif;
        background: linear-gradient(135deg, #1d2671, #c33764);
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .box {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(12px);
        padding: 30px 35px;
        width: 360px;
        border-radius: 15px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        text-align: center;
        color: white;
    }

    .box h2 {
        margin-bottom: 20px;
        font-weight: 600;
    }

    input {
        padding: 12px;
        width: 100%;
        margin-bottom: 15px;
        border-radius: 8px;
        border: none;
        outline: none;
        font-size: 15px;
    }

    input::placeholder {
        color: #666;
    }

    button {
        padding: 12px;
        width: 100%;
        background: #ff9800;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #ffb74d;
        transform: translateY(-2px);
    }

    .error {
        color: #ffeb3b;
        margin-bottom: 10px;
        font-weight: bold;
    }
</style>

</head>
<body>

<div class="box">
    <h2>🔐 Admin Login</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="post">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
