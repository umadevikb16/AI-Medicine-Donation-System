<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
       body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(135deg, #dbeafe, #ecfdf5);
}

/* CENTER PAGE */
.page-wrapper {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.login-card {
    width: 380px;
    background: white;
    padding: 35px 40px;
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.12);
}

/* TITLE */
.login-title {
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 25px;
    padding: 14px;
    border-radius: 14px;
    color: white;
    background: linear-gradient(90deg, #2563eb, #22c55e);
}

/* INPUTS */
.login-card input {
    width: 100%;
    padding: 12px 14px;
    margin-bottom: 14px;
    border-radius: 10px;
    border: 1px solid #d1d5db;
    font-size: 14px;
}

.login-card input:focus {
    outline: none;
    border-color: #2563eb;
    box-shadow: 0 0 0 2px rgba(37,99,235,0.2);
}

/* BUTTON */
.login-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(90deg, #2563eb, #1d4ed8);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
}

.login-btn:hover {
    opacity: 0.95;
}

/* LINKS */
.login-links {
    text-align: center;
    margin-top: 18px;
}

.login-links a {
    color: #2563eb;
    text-decoration: none;
    font-weight: 500;
}

.login-links a:hover {
    text-decoration: underline;
}

.register-links {
    margin-top: 8px;
    font-size: 14px;
}

    </style>
</head>
<body>

<div class="page-wrapper">

    <div class="login-card">

        <div class="login-title">
            Login
        </div>

        <form method="POST">

            <input type="email" name="email" placeholder="Email" required>

            <input type="password" name="password" placeholder="Password" required>

            <button type="submit" class="login-btn">Login</button>

        </form>

        <div class="login-links">
            <a href="/forgot-password">Forgot Password?</a>
            <div class="register-links">
                <a href="/register/donor">Donor Register</a> |
                <a href="/register/ngo">NGO Register</a>
            </div>
        </div>

    </div>

</div>

</body>

</html>
